name: Code Quality (SAST)

on: 
  workflow_call:

  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: ["20", "22", "24"]

    steps:
       - name: checkout code
         uses: actions/checkout@v4

       - name: setup node v${{ matrix.node-version }}
         uses: actions/setup-node@v4
         with:
           node-version: ${{ matrix.node-version }}

       - name: install dependencies
         run: npm install
         working-directory: frontend

       - name: run linter
         run: npm run lint
         working-directory: frontend

       - name: Run Snyk Code (SAST) and generate SARIF
         uses: snyk/actions/node@master
         env:
           SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
         with:
           args: code test frontend --severity-threshold=high --sarif-file-output=frontend-snyk-v${{ matrix.node-version }}-${{github.sha}}.sarif

       - name: Upload SARIF report to GitHub
         uses: github/codeql-action/upload-sarif@v2
         with:
           sarif_file: frontend-snyk-v${{ matrix.node-version }}-${{github.sha}}.sarif

  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: ["20", "22", "24"]

    steps:
       - name: checkout code
         uses: actions/checkout@v4

       - name: setup node v${{ matrix.node-version }}
         uses: actions/setup-node@v4
         with:
           node-version: ${{ matrix.node-version }}
           
       - name: install dependencies
         run: npm install
         working-directory: backend

       - name: run linter
         run: npm run lint
         working-directory: backend

       - name: Run Snyk Code (SAST) and generate SARIF
         uses: snyk/actions/node@master
         env:
           SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
         with:
           args: code test backend --severity-threshold=high --sarif-file-output=backend-snyk-v${{ matrix.node-version }}-${{github.sha}}.sarif

       - name: Upload SARIF report to GitHub
         uses: github/codeql-action/upload-sarif@v2
         with:
           sarif_file: backend-snyk-v${{ matrix.node-version }}-${{github.sha}}.sarif
    
