# ============================================================
# Workflow Name
# This appears inside GitHub Actions UI
# ============================================================
name: manual-click-cicd

# ============================================================
# Trigger Section
# workflow_dispatch = manual trigger from GitHub UI
# It allows passing runtime parameters (inputs)
# ============================================================
on:
  workflow_dispatch:
    inputs:
      server_environment:
        description: "Environment to deploy to (dev/staging/prod)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

# ============================================================
# Jobs Section
# Each job runs on a fresh VM (isolated runner)
# Jobs run in parallel by default unless `needs` is used
# ============================================================
jobs:

  # ------------------------------------------------------------
  # 1️⃣ CODE JOB
  # Responsible for fetching source code
  # ------------------------------------------------------------
  code:
    runs-on: ubuntu-latest   # GitHub-hosted runner (ephemeral VM)
    steps:
      - name: Clone and checkout the code
        # In real pipeline use:
        # uses: actions/checkout@v4
        run: echo "Cloning the code and checking out the branch..."

  # ------------------------------------------------------------
  # 2️⃣ BUILD JOB
  # Builds docker image
  # `needs: code` ensures this runs only after code job succeeds
  # ------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: code              # Creates dependency chain
    steps:
      - name: Build the docker container
        run: echo "Building docker container..."

  # ------------------------------------------------------------
  # 3️⃣ TEST JOB
  # Runs tests on built artifact
  # Runs only if build succeeds
  # ------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Testing the docker container
        run: echo "Testing the docker container..."

  # ------------------------------------------------------------
  # 4️⃣ DEPLOY JOB
  # This runs ONLY if:
  #   - build and test both succeed
  #   - AND selected environment == 'prod'
  #
  # IMPORTANT:
  # workflow_dispatch inputs are accessed via:
  # github.event.inputs.<input_name>
  # NOT via env.<name>
  # ------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]

    # Conditional job execution
    # Evaluated BEFORE job is scheduled
    if: ${{ github.event.inputs.server_environment == 'prod' }}

    steps:
      - name: Deploy the built containers
        run: echo "Deploying the docker containers..."
