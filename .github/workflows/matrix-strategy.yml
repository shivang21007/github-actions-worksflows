name:  GitHub Matrix Strategy HandsOn

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        fail-fast: false # false - run all jobs even if one fails, true - stop all jobs if one fails
        os: [ubuntu-latest, macos-latest, windows-latest] # runs on each os
        node-version: [18.x, 20.x, 22.x, 24.x] # runs on each node version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run the script 
        run: node print-version.js