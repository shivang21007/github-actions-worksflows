<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivang | Systems Engineer</title>

<style>
:root {
    --bg: #0d1117;
    --green: #00ff9c;
    --blue: #58a6ff;
    --gray: #8b949e;
    --white: #c9d1d9;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--green);
    font-family: "Courier New", monospace;
    height: 100vh;
    overflow: hidden;
}

#terminal {
    padding: 20px;
    height: 100vh;
    overflow-y: auto;
}

.line {
    margin-bottom: 6px;
    white-space: pre-wrap;
}

.input-line {
    display: flex;
}

.prompt {
    color: var(--blue);
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    color: var(--green);
    font-family: inherit;
    font-size: 16px;
    width: 100%;
    outline: none;
}

.section-title {
    color: var(--blue);
    margin-top: 15px;
    margin-bottom: 5px;
}

.highlight {
    color: var(--white);
}

@keyframes blink {
    50% { opacity: 0; }
}

.cursor {
    display: inline-block;
    width: 8px;
    background: var(--green);
    animation: blink 1s infinite;
}
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const bootSequence = [
    "Booting ShivangOS v1.0...",
    "[ OK ] Initializing kernel modules",
    "[ OK ] Mounting /dev/systems",
    "[ OK ] Starting container runtime",
    "[ OK ] Establishing secure channel",
    "[ OK ] Loading DevOps personality",
    "",
    "Welcome to Shivang's Interactive Portfolio",
    "Type 'help' to list available commands."
];

function printLine(text = "") {
    const line = document.createElement("div");
    line.classList.add("line");
    line.textContent = text;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
}

function createInput() {
    const inputLine = document.createElement("div");
    inputLine.classList.add("input-line");

    const prompt = document.createElement("span");
    prompt.classList.add("prompt");
    prompt.textContent = "shivang@systems:~$";

    const input = document.createElement("input");
    input.autofocus = true;

    inputLine.appendChild(prompt);
    inputLine.appendChild(input);
    terminal.appendChild(inputLine);

    input.focus();

    input.addEventListener("keydown", handleCommand);

    terminal.scrollTop = terminal.scrollHeight;
}

let history = [];
let historyIndex = -1;

function handleCommand(e) {
    const input = e.target;

    if (e.key === "Enter") {
        const command = input.value.trim();
        history.push(command);
        historyIndex = history.length;
        input.parentElement.remove();
        printLine("shivang@systems:~$ " + command);
        execute(command);
    }

    if (e.key === "ArrowUp") {
        if (historyIndex > 0) {
            historyIndex--;
            input.value = history[historyIndex];
        }
    }

    if (e.key === "ArrowDown") {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            input.value = history[historyIndex];
        } else {
            input.value = "";
        }
    }
}

function execute(command) {
    switch(command.toLowerCase()) {
        case "help":
            printLine("");
            printLine("Available commands:");
            printLine("  about      → Who I am");
            printLine("  skills     → Technical stack");
            printLine("  projects   → What I've built");
            printLine("  contact    → How to reach me");
            printLine("  clear      → Clear terminal");
            break;

        case "about":
            printLine("");
            printLine("Backend & DevOps Engineer.");
            printLine("Deep into Linux internals, system design, process isolation,");
            printLine("namespaces, networking, and distributed systems.");
            printLine("Believes in first principles. No abstraction without understanding.");
            break;

        case "skills":
            printLine("");
            printLine("Core Expertise:");
            printLine("- Linux Internals (process, memory, namespaces)");
            printLine("- Docker / Container Runtime");
            printLine("- Kubernetes (CKA path)");
            printLine("- AWS Architecture");
            printLine("- CI/CD Pipelines");
            printLine("- Database Optimization");
            printLine("- Shell Scripting & Automation");
            break;

        case "projects":
            printLine("");
            printLine("Highlighted Work:");
            printLine("- Built custom CI/CD pipelines");
            printLine("- Designed containerized microservices");
            printLine("- Automated infrastructure provisioning");
            printLine("- Deep dive tooling for TLS & network audits");
            break;

        case "contact":
            printLine("");
            printLine("Let's connect:");
            printLine("LinkedIn: linkedin.com/in/shivang21007");
            printLine("GitHub: github.com/shivang21007");
            printLine("Email: shivanggupta2611@gmail.com");
            break;

        case "clear":
            terminal.innerHTML = "";
            break;

        default:
            if (command !== "") {
                printLine("Command not found. Type 'help'.");
            }
    }

    createInput();
}

async function boot() {
    for (let line of bootSequence) {
        printLine(line);
        await new Promise(r => setTimeout(r, 400));
    }
    createInput();
}

boot();
</script>

</body>
</html>
